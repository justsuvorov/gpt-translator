# Main configuration
app:
  name: "GPT Translator"
  version: "1.0.0"

openai:
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-4o-mini"
  base_url: "https://api.openai.com/v1"

paths:
  data_raw: "./data/raw"
  data_processed: "./data/processed"
  models: "./data/models"
  logs: "./logs"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
